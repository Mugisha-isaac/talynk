services:
  postgres-db:
    image: postgres:16-alpine
    container_name: talynk-postgres
    restart: always
    environment:
      POSTGRES_USER: talynk_admin
      POSTGRES_PASSWORD: 123@talynk_admin
      POSTGRES_DB: talynk_ml_metadata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talynk_admin -d talynk_ml_metadata"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: